<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; background: #1e293b; color: white; }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: none; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; cursor: pointer; font-weight: bold; }
    .status { font-size: 11px; color: #10b981; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <h3>Teacher Control</h3>
  <input type="text" id="urlInput" placeholder="Enter URL (https://google.com)">
  <button id="pushBtn">Push to Students</button>
  <div class="status">Mode: Active Monitor</div>

  <script>
    document.getElementById('pushBtn').onclick = () => {
      const url = document.getElementById('urlInput').value;
      if (url.startsWith('http')) {
        // Send the URL to the background script
        chrome.runtime.sendMessage({ action: "pushUrl", url: url });
        alert("Pushed to students!");
      } else {
        alert("Include https://");
      }
    };
  </script>
</body>
</html>
