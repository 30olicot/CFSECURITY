<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P2P School Monitor (No Firebase)</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #3b82f6; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .setup-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; text-align: center; }
        .card { background: var(--card); padding: 2rem; border-radius: 12px; width: 100%; max-width: 500px; }
        textarea { width: 100%; height: 80px; margin: 10px 0; background: #000; color: #0f0; border: 1px solid #334155; font-family: monospace; font-size: 10px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px; }
        .hidden { display: none !important; }
        #nav { height: 60px; background: var(--card); display: flex; align-items: center; padding: 0 20px; gap: 10px; }
        #nav input { flex-grow: 1; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; }
        iframe { flex-grow: 1; border: none; background: white; }
        .status { font-size: 12px; color: #10b981; }
    </style>
</head>
<body>

    <!-- 1. SETUP PHASE (Manual Signaling) -->
    <div id="setup" class="setup-overlay">
        <div class="card" id="role-selection">
            <h2>Select Your Role</h2>
            <button onclick="startTeacher()">I am the Teacher</button>
            <button onclick="startStudent()">I am a Student</button>
        </div>

        <div class="card hidden" id="teacher-setup">
            <h3>Teacher: Step 1</h3>
            <p>Copy this code and send it to your students:</p>
            <textarea id="teacher-offer" readonly></textarea>
            <h3>Step 2</h3>
            <p>Paste a student's response code here:</p>
            <textarea id="teacher-answer" placeholder="Paste student answer here..."></textarea>
            <button onclick="teacherConnect()">Connect to Student</button>
        </div>

        <div class="card hidden" id="student-setup">
            <h3>Student: Step 1</h3>
            <p>Paste the Teacher's code here:</p>
            <textarea id="student-input" placeholder="Paste teacher code here..."></textarea>
            <button onclick="studentCreateAnswer()">Generate Response</button>
            <div id="student-response-area" class="hidden">
                <p>Now copy this and send it back to the Teacher:</p>
                <textarea id="student-answer" readonly></textarea>
            </div>
        </div>
    </div>

    <!-- 2. MONITORING INTERFACE -->
    <div id="nav" class="hidden">
        <span class="status">● Connected</span>
        <input type="text" id="urlInput" placeholder="Teacher: Paste URL here (https://...)">
        <button id="pushBtn" class="hidden">Push to Student</button>
    </div>
    <iframe id="mainFrame" src="about:blank"></iframe>

    <script>
        const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:://google.com" }] });
        let dataChannel;

        // --- TEACHER LOGIC ---
        async function startTeacher() {
            document.getElementById('role-selection').classList.add('hidden');
            document.getElementById('teacher-setup').classList.remove('hidden');
            
            dataChannel = pc.createDataChannel("monitor");
            setupDataChannel();

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            // Wait for ICE candidates to gather
            pc.onicecandidate = (e) => {
                if (!e.candidate) document.getElementById('teacher-offer').value = btoa(JSON.stringify(pc.localDescription));
            };
        }

        async function teacherConnect() {
            const answer = JSON.parse(atob(document.getElementById('teacher-answer').value));
            await pc.setRemoteDescription(answer);
            document.getElementById('pushBtn').classList.remove('hidden');
        }

        // --- STUDENT LOGIC ---
        function startStudent() {
            document.getElementById('role-selection').classList.add('hidden');
            document.getElementById('student-setup').classList.remove('hidden');
            
            pc.ondatachannel = (e) => {
                dataChannel = e.channel;
                setupDataChannel();
            };
        }

        async function studentCreateAnswer() {
            const offer = JSON.parse(atob(document.getElementById('student-input').value));
            await pc.setRemoteDescription(offer);
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            pc.onicecandidate = (e) => {
                if (!e.candidate) {
                    document.getElementById('student-answer').value = btoa(JSON.stringify(pc.localDescription));
                    document.getElementById('student-response-area').classList.remove('hidden');
                }
            };
        }

        // --- COMMON LOGIC ---
        function setupDataChannel() {
            dataChannel.onopen = () => {
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('nav').classList.remove('hidden');
            };
            dataChannel.onmessage = (e) => {
                document.getElementById('mainFrame').src = e.data;
            };
        }

        document.getElementById('pushBtn').onclick = () => {
            const url = document.getElementById('urlInput').value;
            if (url.startsWith('http')) {
                dataChannel.send(url);
                document.getElementById('mainFrame').src = url;
            }
        };
    </script>
</body>
</html>
